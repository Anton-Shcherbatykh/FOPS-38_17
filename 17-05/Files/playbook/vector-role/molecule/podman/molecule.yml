---
driver:
  name: podman

platforms:
  - name: ubuntu-22-04
    image: mpaivabarbosa/molecule-systemd-ubuntu:22.04
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd

provisioner:
  name: ansible
  ansible_cfg:
    defaults:
      remote_tmp: /tmp/ansible

verifier:
  name: ansible

scenario:
  name: podman
  test_sequence:
    - create
    - prepare      # добавил подготовку
    - converge
    - verify
    - destroy
