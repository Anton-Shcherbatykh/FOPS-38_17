- name: Install Clickhouse
  hosts: clickhouse
  become: true
  handlers:
    - name: Start clickhouse service
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted
  tasks:
    - name: Install dependencies for Clickhouse repository
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create directory for apt keyrings
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        mode: '0755'

    - name: Download and add Clickhouse GPG key
      ansible.builtin.shell:
        cmd: |
          curl -fsSL 'https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key' | \
          gpg --dearmor -o /usr/share/keyrings/clickhouse-keyring.gpg
        creates: /usr/share/keyrings/clickhouse-keyring.gpg

    - name: Add Clickhouse repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg arch=amd64] https://packages.clickhouse.com/deb stable main"
        state: present
        update_cache: true

    - name: Install Clickhouse packages
      ansible.builtin.apt:
        name:
          - clickhouse-common-static
          - clickhouse-client
          - clickhouse-server
        state: present
        update_cache: true
      notify: Start clickhouse service

    - name: Pause 20 sec
      ansible.builtin.pause:
        seconds: 20

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0
  tags: clickhouse

