---
- name: Install Nginx
  handlers:
    - name: Start nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
      become: true
      become_method: sudo
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
      become: true
      become_method: sudo
  hosts: lighthouse
  tasks:
    - name: Nginx
      become: true
      ansible.builtin.apt:
        name: nginx
        state: present
    - name: Nginx | Create config
      become: true
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        mode: '0644'
      notify: Start nginx
  tags: Nginx

